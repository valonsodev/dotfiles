[General]
HaltCommand=/usr/bin/systemctl poweroff
RebootCommand=/usr/bin/systemctl reboot
DisplayServer=wayland
Numlock=on

[Wayland]
CompositorCommand=Hyprland #-c "/home/valonso/.config/dotfiles/hypr/hyprland.conf"

[Users]
MaximumUid=60513
MinimumUid=1000

